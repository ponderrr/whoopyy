name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest --tb=short -q
      - name: Run mypy
        run: mypy src/ --ignore-missing-imports

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build backend
        run: pip install --upgrade build twine
      - name: Build wheel and sdist
        run: python -m build
      - name: Verify distributions
        run: twine check dist/*
      - name: Upload distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: testpypi
      url: https://test.pypi.org/p/whoopyy
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true

  verify-testpypi:
    name: Verify TestPyPI install
    runs-on: ubuntu-latest
    needs: [publish-testpypi]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Wait for TestPyPI propagation
        run: sleep 30
      - name: Install from TestPyPI
        run: |
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            whoopyy
      - name: Verify import
        run: |
          python -c "
          import whoopyy
          print(f'whoopyy version: {whoopyy.__version__}')
          from whoopyy import WhoopClient, AsyncWhoopClient, OAuthHandler
          from whoopyy.models import Recovery, Sleep, Cycle, Workout
          from whoopyy.exceptions import WhoopAPIError, WhoopAuthError, WhoopNetworkError, WhoopNotFoundError
          print('All imports successful')
          "

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [verify-testpypi]
    environment:
      name: pypi
      url: https://pypi.org/p/whoopyy
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

  verify-pypi:
    name: Verify PyPI install
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Wait for PyPI propagation
        run: sleep 60
      - name: Install from PyPI
        run: pip install whoopyy
      - name: Verify import and version
        run: |
          python -c "
          import whoopyy
          print(f'whoopyy {whoopyy.__version__} installed successfully from PyPI')
          from whoopyy import WhoopClient, AsyncWhoopClient, OAuthHandler
          print('All core imports verified')
          "
